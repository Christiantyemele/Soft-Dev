name: Auto-sync branches with main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync-branches:
    name: Rebase active feature branches onto main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect active FORGE branches
        id: detect
        run: |
          BRANCHES=""
          for ref in $(git branch -r | grep -o 'origin/forge-[^\s]*' | sed 's|origin/||'); do
            BEHIND=$(git rev-list --count "$ref..origin/main" 2>/dev/null || echo "0")
            if [ "$BEHIND" -gt 0 ]; then
              echo "Branch $ref is $BEHIND commits behind main — will rebase"
              BRANCHES="$BRANCHES $ref"
            else
              echo "Branch $ref is up to date — skipping"
            fi
          done
          BRANCHES=$(echo "$BRANCHES" | xargs)
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "Detected branches to sync: $BRANCHES"

      - name: Rebase branches onto main
        if: steps.detect.outputs.branches != ''
        run: |
          git config user.name "AgentFlow Sync Bot"
          git config user.email "agentflow-sync-bot@users.noreply.github.com"

          SYNC_STATUS=""
          for branch in ${{ steps.detect.outputs.branches }}; do
            echo "Rebasing $branch onto origin/main..."
            git checkout "$branch"
            if git rebase origin/main; then
              git push --force-with-lease origin "$branch"
              SYNC_STATUS="$SYNC_STATUS $branch:SYNCED"
              echo "Successfully synced $branch"
            else
              git rebase --abort
              git checkout main
              SYNC_STATUS="$SYNC_STATUS $branch:CONFLICT"
              echo "CONFLICT detected in $branch — aborting rebase, manual resolution required"
            fi
          done

          SYNC_STATUS=$(echo "$SYNC_STATUS" | xargs)
          echo "sync_status=$SYNC_STATUS" >> $GITHUB_OUTPUT
          echo "Final sync status: $SYNC_STATUS"

      - name: Report sync results
        if: steps.detect.outputs.branches != ''
        run: |
          echo "## Branch Sync Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for entry in ${{ steps.rebase.outputs.sync_status }}; do
            branch=$(echo "$entry" | cut -d: -f1)
            status=$(echo "$entry" | cut -d: -f2)
            if [ "$status" = "SYNCED" ]; then
              echo "- \`$branch\`: Synced with main" >> $GITHUB_STEP_SUMMARY
            else
              echo "- \`$branch\`: CONFLICT — manual resolution required" >> $GITHUB_STEP_SUMMARY
            fi
          done
